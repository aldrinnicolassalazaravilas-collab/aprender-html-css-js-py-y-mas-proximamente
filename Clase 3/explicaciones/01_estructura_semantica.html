<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estructura semántica explicada</title>
    <style>
        /* ========== CSS BÁSICO ========== */
        body { font-family: Arial; margin: 0; }

        header {
            background-color: #2c3e50;
            color: white;
            padding: 30px;
            text-align: center;
        }

        nav {
            background-color: #34495e;
            padding: 15px;
            text-align: center;
        }

        nav a {
            color: white;
            text-decoration: none;  /* quita subrayado */
            margin: 0 15px;        /* separa los links */
        }

        main {
            padding: 20px;
            background-color: #f4f4f4;
        }

        footer {
            background-color: #2c3e50;
            color: white;
            text-align: center;
            padding: 15px;
        }
    </style>
</head>
<body>

    <!-- CABECERA: logo y título -->
    <header>
        <h1>Mis Recetas</h1>
        <p>Cocina casera fácil y deliciosa</p>
    </header>

    <!-- NAVEGACIÓN: menú principal -->
    <nav>
        <a href="#">Inicio</a>
        <a href="#">Recetas</a>
        <a href="#">Contacto</a>
    </nav>

    <!-- CONTENIDO PRINCIPAL: único por página -->
    <main>
        <article>
            <h2>Tajadas con queso</h2>
            <p>Deliciosas tajadas de plátano frito con queso rallado.</p>
        </article>
    </main>

    <!-- PIE DE PÁGINA -->
    <footer>
        <p>&copy; 2026 - Mis Recetas</p>
    </footer>

</body>
</html>
